<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Prevent FOUC by applying theme early -->
    <script>
      (function() {
        try {
          var saved = null;
          try { saved = localStorage.getItem('theme'); } catch(e) { saved = null; }
          if (saved === 'dark') { document.documentElement.classList.add('dark'); return; }
          if (saved === 'light') { document.documentElement.classList.remove('dark'); return; }
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (prefersDark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) { /* fail silently */ }
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no">
    <meta http-equiv="x-ua-compatible" content="IE=edge">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Use the fonts you actually need; preload hero font if critical -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Structured data (JSON-LD): Organization + Website + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://www.echowritings.com/#org",
          "name": "EchoWritings",
          "url": "https://www.echowritings.com/",
          "logo": "https://www.echowritings.com/logo.png",
          "sameAs": [
            "https://x.com/EchoWritings",
            "https://www.instagram.com/echowritings/",
            "https://www.linkedin.com/company/echowritings/"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://www.echowritings.com/#website",
          "url": "https://www.echowritings.com/",
          "name": "EchoWritings",
          "publisher": { "@id": "https://www.echowritings.com/#org" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://www.echowritings.com/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
